<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>React UMD Demo</title>
    <!-- React 和 ReactDOM 的 CDN UMD 版本 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- classnames 依赖-->
    <!-- <script src="https://cdn.bootcss.com/classnames/2.2.5/index.js"></script> -->
    <script src="https://unpkg.com/clsx@2.1.0/dist/clsx.min.js"></script>
    <!--
    注意：开发环境用 development.js，上线换成 production.min.js
    生产环境用 https://unpkg.com/react@18/umd/react.production.min.js
  -->
    <script src="./dist/index.umd.js"></script>
    <link rel="stylesheet" href="./dist/style/css.css" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // React 和 ReactDOM 会自动挂载到 window 对象
      // window.React, window.ReactDOM

      // 简单 React 组件
      // function Hello(props) {
      //   return React.createElement('h1', null, 'Hello, ' + props.name);
      // }

      // 渲染到 DOM
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ReactUi.Button, null, 'Button xxxx'));
    </script>
  </body>
</html>
